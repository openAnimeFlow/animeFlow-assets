name: Validate Plugin JSON

on:
  push:
    paths:
      - 'plugins/*.json'
      - 'plugins/script/**'
  pull_request:
    paths:
      - 'plugins/*.json'
      - 'plugins/script/**'
  workflow_dispatch:

jobs:
  validate-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Get changed JSON files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            plugins/*.json

      - name: Validate plugin JSON
        env:
          PLUGIN_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          PLUGIN_DELETED_FILES: ${{ steps.changed-files.outputs.deleted_files }}
        run: dart plugins/script/validate_plugins.dart

      - name: Update plugins/index.json
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip index]')) }}
        env:
          PLUGIN_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          PLUGIN_DELETED_FILES: ${{ steps.changed-files.outputs.deleted_files }}
        run: dart plugins/script/update_index.dart

      - name: Commit updated index.json
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip index]')) }}
        run: |
          INDEX_FILE="plugins/index.json"

          if [ ! -f "$INDEX_FILE" ]; then
            echo "Error: $INDEX_FILE was not generated"
            exit 1
          fi

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add "$INDEX_FILE"

          if git diff --cached --quiet; then
            echo "No changes to $INDEX_FILE, skipping commit"
            exit 0
          fi

          git commit -m "chore: auto-update index.json [skip index]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
