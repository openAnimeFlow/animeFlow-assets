name: Validate Plugin JSON

on:
  push:
    paths:
      - 'plugins/*.json'
  pull_request:
    paths:
      - 'plugins/*.json'

jobs:
  validate-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get changed JSON files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            plugins/*.json

      - name: Validate JSON format and structure
        run: |
          # 定义必需的字段及其类型
          declare -A REQUIRED_FIELDS_TYPES
          REQUIRED_FIELDS_TYPES["version"]="string"
          REQUIRED_FIELDS_TYPES["name"]="string"
          REQUIRED_FIELDS_TYPES["iconUrl"]="string"
          REQUIRED_FIELDS_TYPES["baseUrl"]="string"
          REQUIRED_FIELDS_TYPES["searchUrl"]="string"
          REQUIRED_FIELDS_TYPES["searchList"]="string"
          REQUIRED_FIELDS_TYPES["searchName"]="string"
          REQUIRED_FIELDS_TYPES["searchLink"]="string"
          REQUIRED_FIELDS_TYPES["lineNames"]="string"
          REQUIRED_FIELDS_TYPES["lineList"]="string"
          REQUIRED_FIELDS_TYPES["episode"]="string"
          
          # 转换为数组以便遍历
          REQUIRED_FIELDS=("version" "name" "iconUrl" "baseUrl" "searchUrl" "searchList" "searchName" "searchLink" "lineNames" "lineList" "episode")
          
          echo "📋 Plugin JSON format requirements:"
          echo "Required fields: ${REQUIRED_FIELDS[*]}"
          echo "All fields must be of type: string"
          echo ""
          
          # 获取所有变更的 JSON 文件
          CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          DELETED_FILES="${{ steps.changed-files.outputs.deleted_files }}"
          
          if [ -z "$CHANGED_FILES" ] && [ -z "$DELETED_FILES" ]; then
            echo "No JSON files changed, skipping validation"
            exit 0
          fi
          
          is_deleted_file() {
            local target="$1"
            for d in $DELETED_FILES; do
              [ "$d" = "$target" ] && return 0
            done
            return 1
          }
          
          VALIDATION_FAILED=false
          
          # 遍历每个变更的 JSON 文件（排除 index.json）
          for file in $CHANGED_FILES; do
            if [[ "$file" == *"index.json"* ]]; then
              echo "⏭️  Skipping index.json validation"
              continue
            fi
            
            echo "🔍 Validating: $file"
            
            # 检查文件是否存在
            if [ ! -f "$file" ]; then
              if is_deleted_file "$file"; then
                echo "   ⏭️  File $file was deleted, skipping validation"
                echo ""
                continue
              fi
              echo "   ❌ Error: File $file does not exist"
              VALIDATION_FAILED=true
              echo ""
              continue
            fi
            
            # 验证 JSON 格式是否正确
            if ! jq empty "$file" 2>/dev/null; then
              echo "   ❌ Error: $file is not valid JSON"
              jq empty "$file" 2>&1 | sed 's/^/      /'
              VALIDATION_FAILED=true
              echo ""
              continue
            fi
            
            # 获取待验证文件的所有键
            FILE_KEYS=$(jq -r 'keys[]' "$file")
            
            # 检查必需字段是否存在且类型匹配
            for field in "${REQUIRED_FIELDS[@]}"; do
              expected_type="${REQUIRED_FIELDS_TYPES[$field]}"
              
              if ! jq -e ".$field" "$file" > /dev/null 2>&1; then
                echo "   ❌ Error: Missing required field: $field"
                VALIDATION_FAILED=true
              else
                # 验证字段类型是否与规范匹配
                file_field_type=$(jq -r ".$field | type" "$file")
                
                if [ "$file_field_type" == "null" ]; then
                  echo "   ❌ Error: Field '$field' has null value (required non-null)"
                  VALIDATION_FAILED=true
                elif [ "$file_field_type" != "$expected_type" ]; then
                  echo "   ❌ Error: Field '$field' type mismatch. Expected: $expected_type, Got: $file_field_type"
                  VALIDATION_FAILED=true
                fi
              fi
            done
            
            # 检查是否有额外的字段（给出警告，但不阻止）
            for key in $FILE_KEYS; do
              if [[ ! " ${REQUIRED_FIELDS[@]} " =~ " ${key} " ]]; then
                echo "   ⚠️  Warning: Extra field '$key' found (not in template)"
              fi
            done
            
            # 验证版本号格式（应该是字符串，如 "1.0.0"）
            version=$(jq -r '.version' "$file")
            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "   ⚠️  Warning: version format should be semantic (e.g., '1.0.0'), got: '$version'"
            fi
            
            # 验证 URL 字段格式
            iconUrl=$(jq -r '.iconUrl' "$file")
            if [[ ! "$iconUrl" =~ ^https?:// ]]; then
              echo "   ⚠️  Warning: iconUrl should be a valid HTTP(S) URL, got: '$iconUrl'"
            fi
            
            baseUrl=$(jq -r '.baseUrl' "$file")
            if [[ ! "$baseUrl" =~ ^https?:// ]]; then
              echo "   ⚠️  Warning: baseUrl should be a valid HTTP(S) URL, got: '$baseUrl'"
            fi
            
            searchUrl=$(jq -r '.searchUrl' "$file")
            if [[ ! "$searchUrl" =~ ^https?:// ]]; then
              echo "   ⚠️  Warning: searchUrl should be a valid HTTP(S) URL, got: '$searchUrl'"
            elif [[ ! "$searchUrl" =~ \{keyword\} ]]; then
              echo "   ⚠️  Warning: searchUrl should contain {keyword} placeholder, got: '$searchUrl'"
            fi
            
            if [ "$VALIDATION_FAILED" = false ]; then
              echo "   ✅ Validation passed"
            fi
            echo ""
          done
          
          if [ "$VALIDATION_FAILED" = true ]; then
            echo "❌ Validation failed! Please fix the errors above."
            echo ""
            echo "📝 Expected format:"
            echo "{"
            for field in "${REQUIRED_FIELDS[@]}"; do
              echo "  \"$field\": \"<string value>\""
            done
            echo "}"
            exit 1
          else
            echo "✅ All JSON files validated successfully!"
            echo ""
            echo "All plugin JSON files match the required format specification."
          fi

      - name: Update index.json
        if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip index]')
        run: |
          CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          DELETED_FILES="${{ steps.changed-files.outputs.deleted_files }}"
          INDEX_FILE="plugins/index.json"
          
          if [ -z "$CHANGED_FILES" ] && [ -z "$DELETED_FILES" ]; then
            echo "No JSON files changed, skipping index.json update"
            exit 0
          fi
          
          # 检查 index.json 是否存在，不存在则创建
          if [ ! -f "$INDEX_FILE" ]; then
            echo "[]" > "$INDEX_FILE"
            echo "Created empty $INDEX_FILE"
          fi
          
          # 先从 index.json 移除已删除的插件条目
          for file in $DELETED_FILES; do
            case "$file" in
              *index.json*) continue ;;
              plugins/*.json) ;;
              *) continue ;;
            esac
            FILENAME=$(basename "$file")
            BEFORE=$(jq length "$INDEX_FILE")
            jq --arg path "$FILENAME" 'map(select(.path != $path))' "$INDEX_FILE" > "${INDEX_FILE}.tmp" && mv "${INDEX_FILE}.tmp" "$INDEX_FILE"
            AFTER=$(jq length "$INDEX_FILE")
            if [ "$BEFORE" != "$AFTER" ]; then
              echo "🗑️ Removed index entry for deleted plugin: $FILENAME"
            fi
          done
          
          # 获取当前时间戳（毫秒）
          UPDATE_TIME=$(date +%s)000
          
          PLUGIN_FILES_UPDATED=0
          
          # 遍历每个变更的 JSON 文件（排除 index.json）
          for file in $CHANGED_FILES; do
            if [[ "$file" == *"index.json"* ]]; then
              echo "⏭️  Skipping index.json"
              continue
            fi
            
            # 只处理 plugins/ 目录下的 .json 文件
            if [[ "$file" != plugins/*.json ]]; then
              continue
            fi
            
            echo "📝 Updating index for: $file"
            
            # 已删除的条目已在上方从 index 移除
            if [ ! -f "$file" ]; then
              echo "   ⏭️  File $file does not exist (deleted), already handled for index"
              continue
            fi
            
            # 提取文件名
            FILENAME=$(basename "$file")
            
            # 从 JSON 文件提取信息
            NAME=$(jq -r '.name' "$file")
            VERSION=$(jq -r '.version' "$file")
            ICON_URL=$(jq -r '.iconUrl' "$file")
            
            echo "   Name: $NAME"
            echo "   Version: $VERSION"
            echo "   Icon: $ICON_URL"
            echo "   Path: $FILENAME"
            echo "   UpdateTime: $UPDATE_TIME"
            
            # 检查 index.json 中是否已存在该插件（通过 path 字段匹配）
            EXISTS=$(jq -r --arg path "$FILENAME" '.[] | select(.path == $path) | .path' "$INDEX_FILE")
            
            if [ -n "$EXISTS" ]; then
              # 更新现有条目
              echo "   Updating existing entry for $FILENAME"
              jq --arg path "$FILENAME" \
                 --arg name "$NAME" \
                 --arg version "$VERSION" \
                 --arg icon "$ICON_URL" \
                 --arg updateTime "$UPDATE_TIME" \
                 '(.[] | select(.path == $path)) |= {
                   name: $name,
                   version: $version,
                   icon: $icon,
                   path: $path,
                   updateTime: $updateTime
                 }' "$INDEX_FILE" > "${INDEX_FILE}.tmp" && mv "${INDEX_FILE}.tmp" "$INDEX_FILE"
            else
              # 添加新条目
              echo "   Adding new entry for $FILENAME"
              jq --arg name "$NAME" \
                 --arg version "$VERSION" \
                 --arg icon "$ICON_URL" \
                 --arg path "$FILENAME" \
                 --arg updateTime "$UPDATE_TIME" \
                 '. += [{
                   name: $name,
                   version: $version,
                   icon: $icon,
                   path: $path,
                   updateTime: $updateTime
                 }]' "$INDEX_FILE" > "${INDEX_FILE}.tmp" && mv "${INDEX_FILE}.tmp" "$INDEX_FILE"
            fi
            
            PLUGIN_FILES_UPDATED=$((PLUGIN_FILES_UPDATED + 1))
            echo ""
          done
          
          if [ $PLUGIN_FILES_UPDATED -gt 0 ]; then
            echo "✅ Updated index.json with $PLUGIN_FILES_UPDATED plugin(s)"
            echo ""
            echo "Updated index.json content:"
            jq . "$INDEX_FILE"
          else
            echo "ℹ️  No plugin files to update in index.json"
          fi

      - name: Commit updated index.json
        if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip index]')
        run: |
          INDEX_FILE="plugins/index.json"
          
          # 检查 index.json 是否有更改
          if git diff --quiet "$INDEX_FILE"; then
            echo "No changes to index.json, skipping commit"
            exit 0
          fi
          
          # 配置 git
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 提交更改
          git add "$INDEX_FILE"
          git commit -m "chore: auto-update index.json [skip index]" || exit 0
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
